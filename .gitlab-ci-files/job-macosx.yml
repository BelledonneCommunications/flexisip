.job-macosx:
  stage: build 🏗
  tags: [ "macosx-min-xcode12.2-flat" ]
  script:
    - ccache -s
    - export OPENSSL_ROOT_DIR=/usr/local/opt/openssl
    - export MYSQL_DIR=/usr/local/opt/mysql-client
    - export CMAKE_BUILD_PARALLEL_LEVEL=$NJOBS
    - mkdir work
    - cmake -S . -B work -G "$CMAKE_GENERATOR" $DEFAULT_MACOS_CMAKE_OPTIONS $CMAKE_OPTIONS -DENABLE_SOCI_POSTGRESQL_BACKEND=OFF -DENABLE_UNIT_TESTS=ON -DENABLE_UNIT_TESTS_NGHTTP2ASIO=OFF -DENABLE_PROTOBUF=OFF -DENABLE_OPENID_CONNECT=OFF -DENABLE_REDIS_TLS=OFF -DENABLE_SYSTEMD=OFF
    - cmake --build work -- $ADDITIONAL_BUILD_OPTIONS
    - ccache -s
  allow_failure: true # Temporarily allows macosx jobs to fail because c++ 20 is not yet supported on our build machines


#################################################
# Makefile
#################################################

job-macosx-makefile:
  extends:
    - .job-macosx
    - .rules-dev  # ⚠ See `rules.yml`
  variables:
    CMAKE_GENERATOR: Unix Makefiles
    NJOBS: $MAKEFILE_JOBS

#################################################
# Ninja
#################################################

job-macosx-ninja:
  extends:
    - .job-macosx
    - .rules-dev  # ⚠ See `rules.yml`
  variables:
    CMAKE_GENERATOR: Ninja
    NJOBS: $NINJA_JOBS

#################################################
# Xcode
#################################################

job-macosx-xcode:
  extends:
    - .job-macosx
    - .rules-dev  # ⚠ See `rules.yml`
  variables:
    CMAKE_GENERATOR: Xcode
    NJOBS: $MAX_NUMBER_TASK_XCODE
